<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="ball-bg" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#f2f2f2"/>
      <stop offset="100%" stop-color="#b8b8b8"/>
    </radialGradient>
    <clipPath id="ball-clip">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>

  <!-- Shadow -->
  <ellipse cx="105" cy="195" rx="60" ry="8" fill="rgba(0,0,0,0.15)"/>

  <!-- Ball body -->
  <circle cx="100" cy="100" r="95" fill="url(#ball-bg)" stroke="#888" stroke-width="1.5"/>

  <g clip-path="url(#ball-clip)" stroke="#555" stroke-width="2" stroke-linejoin="round">
    <!-- Central pentagon -->
    <polygon points="100,58 138,86 124,132 76,132 62,86" fill="#1a1a1a"/>

    <!-- Seam lines from pentagon corners outward -->
    <line x1="100" y1="58" x2="100" y2="6"/>
    <line x1="138" y1="86" x2="192" y2="68"/>
    <line x1="124" y1="132" x2="158" y2="186"/>
    <line x1="76" y1="132" x2="42" y2="186"/>
    <line x1="62" y1="86" x2="8" y2="68"/>

    <!-- Outer connecting seams -->
    <line x1="100" y1="6" x2="148" y2="28"/>
    <line x1="192" y1="68" x2="148" y2="28"/>
    <line x1="192" y1="68" x2="188" y2="138"/>
    <line x1="158" y1="186" x2="188" y2="138"/>
    <line x1="158" y1="186" x2="100" y2="200"/>
    <line x1="42" y1="186" x2="100" y2="200"/>
    <line x1="42" y1="186" x2="12" y2="138"/>
    <line x1="8" y1="68" x2="12" y2="138"/>
    <line x1="8" y1="68" x2="52" y2="28"/>
    <line x1="100" y1="6" x2="52" y2="28"/>

    <!-- Outer pentagons (partially visible) -->
    <polygon points="100,6 120,0 145,8 148,28 130,18 100,6" fill="#1a1a1a" opacity="0.85"/>
    <polygon points="52,28 38,12 20,18 8,40 8,68 30,50" fill="#1a1a1a" opacity="0.85"/>
    <polygon points="148,28 162,12 180,18 192,40 192,68 170,50" fill="#1a1a1a" opacity="0.85"/>
    <polygon points="12,138 0,155 5,180 25,195 42,186 24,165" fill="#1a1a1a" opacity="0.75"/>
    <polygon points="188,138 200,155 195,180 175,195 158,186 176,165" fill="#1a1a1a" opacity="0.75"/>
  </g>
</svg>
